<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Develop Nepal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      background: #0b4f3a;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: white;
      padding: 3rem 2rem;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    h1 {
      color: #0b4f3a;
      margin-bottom: 0.5rem;
    }

    p {
      color: #6b7280;
      margin-bottom: 2rem;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      width: 100%;
      padding: 1rem;
      border: 1px solid #e2e8f0;
      border-radius: 50px;
      background: white;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .google-btn:hover {
      border-color: #0b4f3a;
      background: #f7fafc;
    }

    .google-btn img {
      width: 24px;
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: #6b7280;
    }

    .footer a {
      color: #0b4f3a;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>🇳🇵 Develop Nepal</h1>
    <p>Sign in to report issues and track progress</p>
    
    <button class="google-btn" id="googleLoginBtn">
      <img src="https://www.google.com/favicon.ico" alt="Google">
      Continue with Google
    </button>

    <div class="footer">
      By signing in, you agree to our 
      <a href="terms.html">Terms</a> and <a href="privacy.html">Privacy Policy</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, signInWithPopup, GoogleAuthProvider } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyDLhB2fK6_b6b09SyeEXxhubEvejdq9iyA",
      authDomain: "develop-nepal.firebaseapp.com",
      projectId: "develop-nepal",
      storageBucket: "develop-nepal.firebasestorage.app",
      messagingSenderId: "436371033887",
      appId: "1:436371033887:web:4f73a3c9104c8fd6a2aa2a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    document.getElementById('googleLoginBtn').addEventListener('click', async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        await setDoc(doc(db, 'users', user.uid), {
          name: user.displayName,
          email: user.email,
          photo: user.photoURL,
          role: 'citizen',
          createdAt: new Date().toISOString()
        }, { merge: true });

        window.location.href = 'index.html';
      } catch (error) {
        alert('Login failed: ' + error.message);
      }
    });
  </script>
</body>
</html>
